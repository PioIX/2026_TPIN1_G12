<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="css/styles.css" />
</head>

<body class="modUsuariosCompleta" onload="cargarUser(), selectUsuarios(), selectPartidas()">
    <h1> Modificacion Preguntas</h1>


    <a href="menuAdmin.html">
        <button id="regresarUsu" type="button">Regresar</button>
    </a>

   <div class="modUsuarios">

      <div class="usuarios">
         <h1> Seleccionar Usuarios</h1>
         <label for="select-usuarios">Usuario:</label>
         <select name="select-usuarios" id="select-usuarios"></select>
     
        <h2>Usuario seleccionada:</h2>
        <table id="tabla-usuarios">
        </table>

      </div>

      <div class="botonesUsu">
        <button type="button" onclick="tablaUsuarios()">Mostrar</button>
        <div class="botonBorrarU"> 
        <button type="button" onclick="borrarUsuario()">Eliminar usuario</button>
        <button type="button" onclick="botonDar()">Darle Admin a este usuario</button>
        <button type="button" onclick="botonQuitar()">Quitarle Admin a este usuario</button>
     </div>

      <div class="partidas">
         <h1>Seleccionar Partida</h1>
         <label for="select-partidas">Partida:</label>
         <select name="select-partidas" id="select-partidas"></select>
      
         <h2>Partida seleccionada:</h2>
         <table id="tabla-partidas">
         </table> 
      </div>

      <div class="botonesParti">
         <button type="button" onclick="borrarPartida()">Eliminar puntaje</button>
         <button type="button" onclick="tablaPartidas()">Mostrar</button>
      </div>
   </div>

</body>
<script src="logic.js"></script>

</html>
