    <!-- INPUTS PREGUNTAS NUEVAS -->
    <div>
        <h1> Escribir pregunta nueva </h1>
        <label for="pregunta-nueva">Pregunta:</label>
        <input type="text" id="pregunta-nueva" name="pregunta-nueva" placeholder="¿Cuál es la bebida más consumida?"
            required>

        <h1>Respuestas nuevas</h1>
        <label for="resp-nueva-1">1:</label>
        <input type="text" id="resp-nueva-1" name="resp-nueva-1" placeholder="Coca" required>

        <label for="resp-nueva-2">2:</label>
        <input type="text" id="resp-nueva-2" name="resp-nueva-2" placeholder="Agua" required>

        <label for="resp-nueva-3">3:</label>
        <input type="text" id="resp-nueva-3" name="resp-nueva-3" placeholder="Jugo" required>

    <!-- DESPLEGABLE Y TABLE preguntas -->

        <h1>Pregunta seleccionada:</h1>

        <table id="tabla-palabras">
        </table>

    <div>

        <button type="button" onclick="hacerPost()">Añadir</button>
        <button type="button" onclick="hacerPut()">Editar</button>
