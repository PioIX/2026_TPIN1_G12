<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="css/styles.css" />
</head>

<body onload="cargarUser(), selectPreguntas(), selectPalabra1(), selectPalabra2(), selectPalabra3(), selectPalabra4(), selectPalabra5()">
    <h1 id="titulos"> Modificacion Usuarios</h1>

    </div>

    <a href="menuAdmin.html">
        <button id = "RegresarPre" type="button">Regresar</button>
    </a>

    <!-- INPUTS PREGUNTAS NUEVAS -->
    <div class="inputPregunta">
        <h2 id="subtitulo"> Escribir pregunta nueva </h2>
        <label id="textos" for="pregunta-nueva">Pregunta:</label>
        <input type="text" id="preguntaNueva" name="pregunta-nueva" placeholder="¿Cuál es la bebida más consumida?"
            required>
    </div>

    <div class="inputPalabras">
        <h2 id="subtitulo">Palabras nuevas</h2>
        <label id="textos" for="resp-nueva-1">1:</label>
        <input type="text" id="pal1" name="resp-nueva-1" placeholder="Coca" required>

        <label id="textos" for="resp-nueva-2">2:</label>
        <input type="text" id="pal2" name="resp-nueva-2" placeholder="Agua" required>

        <label id="textos" for="resp-nueva-3">3:</label>
        <input type="text" id="pal3" name="resp-nueva-3" placeholder="Jugo" required>

        <label id="textos" for="resp-nueva-4">4:</label>
        <input type="text" id="pal4" name="resp-nueva-4" placeholder="Sprite" required>

        <label id="textos" for="resp-nueva-5">5:</label>
        <input type="text" id="pal5" name="resp-nueva-5" placeholder="Fanta" required>
    </div>
    
    <!-- DESPLEGABLE Y TABLE preguntas -->
    <div class="selectPregunta">
        <h2 id="subtitulo"> Seleccionar pregunta para modificar o eliminar</h2>
        <label id="textos" for="select-preguntas">Pregunta:</label>
        <select name="select-preguntas" id="select-preguntas"></select>
    </div>

    <div class="mostrarPregunta">
        <h2 id="subtitulo">Pregunta seleccionada:</h2>

        <table id="tabla-preguntas">
        </table>
        <button type="button" onclick="tablaPreguntas()">Mostrar</button>
    </div>

    <!-- DESPLEGABLE Y TABLE palabras-->
    <div class="selectPalabra">
        <h2 id="subtitulo"> Seleccionar palabra para modificar o eliminar</h2>
        <label id="textos" for="selectpal1">Palabra 1:</label>
        <select name="selectpal1" id="selectpal1"></select>

        <label id="textos" for="selectpal2">2:</label>
        <select name="selectpal2" id="selectpal2"></select>

        <label id="textos" for="selectpal3">3:</label>
        <select name="selectpal3" id="selectpal3"></select>

        <label id="textos" for="selectpal4">4:</label>
        <select name="selectpal4" id="selectpal4"></select>

        <label id="textos" for="selectpal5">5: </label>
        <select name="selectpal5" id="selectpal5"></select>
    </div>

    <div class="mostrarPalabra">
        <h2 id="subtitulo">Palabra seleccionada:</h2>

        <table id="tabla-palabras">
        </table>
        <button type="button" onclick="tablaPalabras()">Mostrar</button>
    </div>
    
    <h2 id="subtitulo">Opciones</h2>

        
    <div class="botonesParti">

        <div class="botonDatos">
            <button type="button" onclick="preguntaDatos()">Añadir</button>
        </div>

        <div class="botonPut">
            <button type="button" onclick="botonCambio()">Editar</button>
        </div>

        <div class="botonDelete">
            <button type="button" onclick="botonBorrar()">Eliminar pregunta y palabras asociadas</button>
        </div>
    </div>
   
</div>
</body>
<script src="logic.js"></script>

</html>
